version: '3'

vars:
  IMAGE: caelestia-shell-build:latest
  REPO: '{{.TASKFILE_DIR}}'
  STAGING: '{{.TASKFILE_DIR}}/build/staging'
  CONFIG_DIR: '{{.HOME}}/.config/quickshell/caelestia'
  USER_LIB_DIR: '{{.HOME}}/.local/lib/caelestia'
  USER_QML_DIR: '{{.HOME}}/.local/lib/qt6/qml'
  DOCKER_RUN: docker run --rm -v {{.REPO}}:/workspace -u $(id -u):$(id -g) -w /workspace {{.IMAGE}}

tasks:
  image:
    desc: Build the Arch build-image (rebuilds only when Dockerfile changes)
    sources:
      - Dockerfile
    cmds:
      - docker build -t {{.IMAGE}} {{.REPO}}

  build:
    desc: Compile and stage a deployable artifact tree under build/staging/
    deps: [image]
    cmds:
      - |
        {{.DOCKER_RUN}} bash -c '
          set -e
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/
          cmake --build build
          rm -rf /workspace/build/staging
          DESTDIR=/workspace/build/staging cmake --install build
        '

  install:
    desc: Move the staged artifacts into user-local dirs
    deps: [build]
    cmds:
      - mkdir -p {{.HOME}}/.config/quickshell {{.HOME}}/.local/lib {{.USER_QML_DIR}}
      - rm -rf {{.CONFIG_DIR}} {{.USER_LIB_DIR}} {{.USER_QML_DIR}}/Caelestia
      - mv {{.STAGING}}/etc/xdg/quickshell/caelestia {{.CONFIG_DIR}}
      - mv {{.STAGING}}/usr/lib/caelestia {{.USER_LIB_DIR}}
      - mv {{.STAGING}}/usr/lib/qt6/qml/Caelestia {{.USER_QML_DIR}}/Caelestia

  clean:
    desc: Remove build dir and staging
    cmds:
      - rm -rf {{.TASKFILE_DIR}}/build

  uninstall:
    desc: Remove the user-local install
    cmds:
      - rm -rf {{.CONFIG_DIR}}
      - rm -rf {{.USER_LIB_DIR}}
      - rm -rf {{.USER_QML_DIR}}/Caelestia

  dev:
    desc: Background the shell against the source repo for live QML hot-reload
    cmds:
      - |
        set -e
        plugin={{.USER_QML_DIR}}/Caelestia/libcaelestiaplugin.so
        if [ ! -f "$plugin" ]; then
          echo "Plugin not installed at $plugin." >&2
          echo "Run 'task install' first." >&2
          exit 1
        fi
        pkill -if 'qs.*caelestia' || true
        sleep 0.3
        log=/tmp/caelestia-dev.log
        env CAELESTIA_LIB_DIR={{.USER_LIB_DIR}} QML2_IMPORT_PATH={{.USER_QML_DIR}}:$QML2_IMPORT_PATH \
          setsid -f qs -p {{.REPO}} >"$log" 2>&1 </dev/null
        echo "Dev shell started. Logs: tail -f $log"

  log:
    desc: Tail the dev shell log (Ctrl+C to exit)
    interactive: true
    cmds:
      - tail -F /tmp/caelestia-dev.log

  prod:
    desc: Stop the dev shell and launch the user-local install in the background
    cmds:
      - |
        pkill -if 'qs.*caelestia' || true
        sleep 0.3
        ( env CAELESTIA_LIB_DIR={{.USER_LIB_DIR}} QML2_IMPORT_PATH={{.USER_QML_DIR}}:$QML2_IMPORT_PATH \
            setsid -f qs -c caelestia </dev/null >/dev/null 2>&1 )
        echo "Shell started"

  shell:
    desc: Drop into a shell inside the build container
    deps: [image]
    interactive: true
    cmds:
      - docker run --rm -it -v {{.REPO}}:/workspace -u $(id -u):$(id -g) -w /workspace {{.IMAGE}}
